<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有灵 · 小说写作 Agent</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 侧边栏 -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <h1 style="margin:0;">✨ 有灵</h1>
            <p class="subtitle">小说写作 Agent</p>
          </div>
          <button id="btn-theme-toggle" class="theme-toggle" title="切换主题">🌙</button>
        </div>
      </div>

      <!-- 项目信息 -->
      <div class="project-info section-card">
        <h3>📖 项目信息</h3>
        <div class="form-group">
          <label>小说标题</label>
          <input type="text" id="project-title" placeholder="输入小说标题" data-field="title">
        </div>
        <div class="form-group">
          <label>类型/题材</label>
          <input type="text" id="project-genre" placeholder="如：都市异能、末日生存" data-field="genre">
        </div>
        <div class="form-group">
          <label>一句话简介</label>
          <textarea id="project-summary" rows="2" placeholder="一句话概括故事核心" data-field="summary"></textarea>
        </div>
        <div class="form-group">
          <label>世界观设定</label>
          <textarea id="project-world" rows="4" placeholder="世界观、力量体系、关键规则…" data-field="world"></textarea>
        </div>
        <button class="btn-secondary" style="width:100%;margin-top:4px;" id="btn-ai-project">🤖 AI 生成项目设定</button>
      </div>

      <!-- 导航 -->
      <nav class="sidebar-nav">
        <button class="nav-btn active" data-tab="characters">
          <span class="nav-icon">🎭</span> 角色
        </button>
        <button class="nav-btn" data-tab="outline">
          <span class="nav-icon">📋</span> 大纲
        </button>
        <button class="nav-btn" data-tab="chapters">
          <span class="nav-icon">📝</span> 章节
        </button>
        <button class="nav-btn" data-tab="writing">
          <span class="nav-icon">✍️</span> 写作
        </button>
        <button class="nav-btn" data-tab="agents">
          <span class="nav-icon">🤖</span> 子 Agent
        </button>
        <button class="nav-btn" data-tab="search">
          <span class="nav-icon">🔍</span> 搜索
        </button>
        <button class="nav-btn" data-tab="backups">
          <span class="nav-icon">💾</span> 备份
        </button>
        <button class="nav-btn" data-tab="statistics">
          <span class="nav-icon">📊</span> 统计
        </button>
        <button class="nav-btn" data-tab="export">
          <span class="nav-icon">📤</span> 导出
        </button>
      </nav>

      <div class="sidebar-footer">
        <button id="btn-new-project" class="btn-secondary">📁 新建项目</button>
        <button id="btn-import" class="btn-secondary">📥 导入</button>
        <input type="file" id="file-import" accept=".json" style="display:none">
      </div>
    </aside>

    <!-- 主内容区 -->
    <main id="main-content">

      <!-- 角色管理 -->
      <section id="tab-characters" class="tab-content active">
        <div class="tab-header">
          <h2>🎭 角色管理</h2>
          <div class="header-actions">
            <button id="btn-ai-characters" class="btn-secondary">🤖 AI 生成角色</button>
            <button id="btn-add-character" class="btn-primary">+ 添加角色</button>
          </div>
        </div>
        <div id="characters-list" class="card-grid"></div>
      </section>

      <!-- 章节大纲 -->
      <section id="tab-outline" class="tab-content">
        <div class="tab-header">
          <h2>📋 章节大纲</h2>
          <div class="header-actions">
            <button id="btn-ai-outline" class="btn-secondary">🤖 AI 生成大纲</button>
            <button id="btn-add-outline" class="btn-primary">+ 添加章节</button>
          </div>
        </div>
        <div id="outline-list" class="outline-container"></div>
      </section>

      <!-- 章节管理 -->
      <section id="tab-chapters" class="tab-content">
        <div class="tab-header">
          <h2>📝 章节列表</h2>
          <div class="header-actions">
            <button id="btn-ai-chapters" class="btn-secondary">🤖 AI 批量生成</button>
            <button id="btn-add-chapter" class="btn-primary">+ 新建章节</button>
          </div>
        </div>
        <div id="chapters-list" class="chapters-container"></div>
      </section>

      <!-- 写作区 -->
      <section id="tab-writing" class="tab-content">
        <div class="writing-toolbar">
          <select id="writing-chapter-select" class="toolbar-select">
            <option value="">选择章节</option>
          </select>
          <div class="writing-actions">
            <button id="btn-save-chapter" class="btn-primary">💾 保存</button>
            <button id="btn-ai-assist" class="btn-secondary">🤖 AI 辅助</button>
          </div>
        </div>
        <div class="writing-area">
          <div id="writing-meta" class="writing-meta">
            <div class="meta-row">
              <label>本章要点：</label>
              <input type="text" id="chapter-keypoints" placeholder="本章关键情节、需要呈现的内容…">
            </div>
            <div class="meta-row">
              <label>写作风格提示：</label>
              <input type="text" id="chapter-style" placeholder="如：紧张、悬疑、轻松…">
            </div>
          </div>
          <textarea id="chapter-editor" class="chapter-editor" placeholder="在这里写小说正文…&#10;&#10;选择章节后开始写作，或点击 AI 辅助让我帮你写。"></textarea>
          <div class="writing-stats">
            <span id="word-count">字数：0</span>
          </div>
        </div>
      </section>

      <!-- 子 Agent 管理 -->
      <section id="tab-agents" class="tab-content">
        <div class="tab-header">
          <h2>🤖 子 Agent 管理</h2>
          <button id="btn-add-agent" class="btn-primary">+ 自定义 Agent</button>
        </div>
        <div id="agents-list" class="card-grid"></div>
      </section>

      <!-- 全文搜索 -->
      <section id="tab-search" class="tab-content">
        <div class="tab-header">
          <h2>🔍 全文搜索</h2>
        </div>
        <div class="search-panel">
          <div class="search-bar">
            <input type="text" id="search-input" class="search-input" placeholder="搜索章节内容、角色描述、大纲…">
            <button id="btn-search" class="btn-primary">搜索</button>
          </div>
          <div id="search-results" class="search-results"></div>
        </div>
      </section>

      <!-- 备份管理 -->
      <section id="tab-backups" class="tab-content">
        <div class="tab-header">
          <h2>💾 备份管理</h2>
          <div class="header-actions">
            <button id="btn-import-backup" class="btn-secondary">📥 导入备份</button>
            <button id="btn-auto-backup" class="btn-secondary">🔄 自动备份</button>
            <button id="btn-backup" class="btn-primary">+ 手动备份</button>
          </div>
        </div>
        <div class="backup-notice">
          <p>💡 自动备份每 5 分钟保存一次，最多保留 20 个备份。建议重要修改前手动备份。</p>
        </div>
        <input type="file" id="file-import-backup" accept=".json" style="display:none">
        <div id="backups-list" class="backups-container"></div>
      </section>

      <!-- 写作统计 -->
      <section id="tab-statistics" class="tab-content">
        <div class="tab-header">
          <h2>📊 写作统计</h2>
        </div>
        <div id="statistics-container" class="statistics-container"></div>
      </section>

      <!-- 导出 -->
      <section id="tab-export" class="tab-content">
        <div class="tab-header">
          <h2>📤 导出</h2>
        </div>
        <div class="export-panel">
          <div class="export-options">
            <div class="export-card" data-format="txt">
              <h3>📄 纯文本</h3>
              <p>导出所有章节为 .txt 文件</p>
              <button class="btn-primary export-btn">导出 TXT</button>
            </div>
            <div class="export-card" data-format="md">
              <h3>📝 Markdown</h3>
              <p>导出为 .md 格式，带章节标题</p>
              <button class="btn-primary export-btn">导出 Markdown</button>
            </div>
            <div class="export-card" data-format="json">
              <h3>💾 项目备份</h3>
              <p>导出完整项目数据（JSON）</p>
              <button class="btn-primary export-btn">导出备份</button>
            </div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- 模态框 -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal"></div>
  </div>

  <script src="js/datastore.js"></script>
  <script src="js/agents.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/outline.js"></script>
  <script src="js/chapters.js"></script>
  <script src="js/writing.js"></script>
  <script src="js/export.js"></script>
  <script src="js/search.js"></script>
  <script src="js/backups.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/app.js"></script>
  <!-- 注：storage.js 已移除，datastore.js 已提供完整的 Storage 包装器 -->
</body>
</html>
